<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #141e30, #243b55);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 380px;
            padding: 35px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            color: white;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(30px);}
            to {opacity: 1; transform: translateY(0);}
        }

        .title {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            margin-bottom: 20px;
            color: #ddd;
        }

        .form-control {
            background: transparent;
            border: 1px solid #ccc;
            color: white;
        }

        .form-control::placeholder {
            color: #ccc;
        }

        .btn-login {
            width: 100%;
            border-radius: 10px;
            background: #00c6ff;
            border: none;
            font-weight: bold;
        }

        .btn-login:hover {
            background: #0072ff;
        }

        .icon {
            text-align: center;
            font-size: 40px;
            margin-bottom: 10px;
        }

        .toggle-password {
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 10px;
            color: #ccc;
        }

        .password-box {
            position: relative;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="icon">📦</div>

    <div class="title">Inventory Management System</div>
    <div class="subtitle">Efficient • Smart • Reliable</div>
    <div th:if="${param.logout}" style="color:lightgreen; text-align:center; margin-bottom:10px;">
        Successfully logged out!
    </div>

    <!-- Error Message -->
    <div th:if="${param.error}" style="color:red; text-align:center; margin-bottom:10px;">
        Invalid username or password
    </div>

    <form th:action="@{/login}" method="post">

        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Enter Email" required>
        </div>

        <div class="mb-3 password-box">
            <input type="password" id="password" name="password" class="form-control" placeholder="Enter Password" required>
            <span class="toggle-password" onclick="togglePassword()">👁</span>
        </div>

        <button type="submit" class="btn btn-login">Login</button>


    </form>

</div>

<script>
    function togglePassword() {
        let pass = document.getElementById("password");
        if (pass.type === "password") {
            pass.type = "text";
        } else {
            pass.type = "password";
        }
    }
</script>

</body>
</html>
