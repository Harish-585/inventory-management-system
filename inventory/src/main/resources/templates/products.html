<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Products</title>

    <style>

        body{
        font-family: Arial;
        margin:40px;
        background:#f4f6f9;
        }

        h2{
        margin-bottom:20px;
        }

        button{
        padding:8px 14px;
        border:none;
        color:white;
        cursor:pointer;
        border-radius:4px;
        }

        .add{
        background:#28a745;
        }

        .csv{
        background:#17a2b8;
        }

        .plus{
        background:#007bff;
        }

        .minus{
        background:#dc3545;
        }

        .delete{
        background:black;
        }

        .back{
        background:#6c757d;
        }

        table{
        width:100%;
        border-collapse: collapse;
        background:white;
        }

        th{
        background:#343a40;
        color:white;
        padding:10px;
        }

        td{
        padding:10px;
        border:1px solid #ddd;
        text-align:center;
        }

    </style>

</head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"rel="stylesheet">
</head>

<body>

<h2>Products</h2>

<div class="mb-3"></div>


<!-- Buttons Section -->
 <a href="/add-product" class="btn btn-success">Add Product</a>

 <a href="/export/csv"class="btn btn-info">Download CSV Report</a>


<br><br>

<table>

    <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Quantity</th>
        <th>Price</th>
        <th>Stock Update</th>
        <th>Action</th>
    </tr>

    <tr th:each="product : ${products}">

        <td th:text="${product.name}"></td>
        <td th:text="${product.category}"></td>
        <td th:text="${product.quantity}"></td>
        <td th:text="${product.price}"></td>

        <td>

            <a th:href="@{/increase/{id}(id=${product.id})}">
                <button class="plus">+1</button>
            </a>

            <a th:href="@{/decrease/{id}(id=${product.id})}">
                <button class="minus">-1</button>
            </a>

        </td>

        <td>

            <a th:href="@{/delete/{id}(id=${product.id})}">
                <button class="delete">Delete</button>
            </a>

        </td>

    </tr>

</table>

<br>

<a href="/dashboard">
    <button class="back">Back</button>
</a>

</body>

</html>
