<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            padding: 25px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        button:hover {
            background-color: #218838;
        }

        .back {
            margin-top: 10px;
            display: block;
            text-align: center;
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Add Product</h2>

    <form th;action="@{/add-product}"method="post">

        <!-- Product Name -->
        <input type="text" name="name" placeholder="Product Name" required>

        <!-- Category -->
        <input type="text" name="category" placeholder="Category" required>

        <!-- Quantity -->
        <input type="number" name="quantity" placeholder="Quantity" required>

        <!-- Price -->
        <input type="number" step="0.01" name="price" placeholder="Price" required>

        <!-- Reorder Level -->
        <input type="number" name="reorderLevel" placeholder="Reorder Level" required>

        <!-- Submit Button -->
        <button type="submit">Add Product</button>

    </form>

    <!-- Back Button -->
    <a href="/products" class="back">⬅ Back to Products</a>

</div>

</body>
</html>
